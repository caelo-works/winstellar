name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

# Least-privilege default: the build job runs on pull_request and builds
# untrusted PR code with the workflow token, so it must not have write. The
# `release` job re-grants `contents: write` for itself only.
permissions:
  contents: read

jobs:
  build:
    name: Build (Windows x64)
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0   # so the CMake git-info step can read full history

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756  # v1
        with:
          arch: x64

      - name: Set up vcpkg (manifest mode, baseline-pinned)
        uses: lukka/run-vcpkg@b1a0dd252f06b9e25b3c022a9a03bd7a427fb6a2  # v11
        with:
          # Pulls vcpkg at the baseline SHA listed in vcpkg.json and enables
          # GitHub Actions binary caching automatically (cache key derived
          # from vcpkg.json + the baseline).
          vcpkgJsonGlob: 'vcpkg.json'

      - name: Configure
        # CMake reads VCPKG_ROOT (set by lukka/run-vcpkg) via the preset.
        run: cmake --preset x64-windows-msvc

      - name: Build (Release)
        run: cmake --build build --config Release

      - name: Verify build outputs
        shell: pwsh
        run: |
          $required = @(
            'WinStellar.exe', 'WinStellarShellExt.dll', 'FitsProps.propdesc',
            'cfitsio.dll', 'sqlite3.dll', 'pugixml.dll', 'z.dll',
            'pthreadVC3.dll'
          )
          foreach ($f in $required) {
            $p = "build/bin/Release/$f"
            if (-not (Test-Path $p)) {
              throw "Missing build artifact: $p"
            }
            Write-Host "  $f"
          }

      - name: Run tests (ctest)
        shell: pwsh
        # gtest_discover_tests registers each TEST individually, so a single
        # failing case fails the job with a precise file:line, and the summary
        # shows pass/fail counts per binary.
        working-directory: build
        run: ctest -C Release --output-on-failure --label-regex winstellar

      - name: Upload binaries
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: WinStellar-bin
          path: |
            build/bin/Release/WinStellar.exe
            build/bin/Release/WinStellarShellExt.dll
            build/bin/Release/FitsProps.propdesc
            build/bin/Release/cfitsio.dll
            build/bin/Release/sqlite3.dll
            build/bin/Release/pugixml.dll
            build/bin/Release/z.dll
            build/bin/Release/pthreadVC3.dll
          if-no-files-found: error
          retention-days: 14

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        # -SkipBuild: the project is already built in the previous step. The
        # script just packages the existing binaries into a single .exe.
        # No signing yet — we'll wire SignPath in via a later step that
        # downloads this artifact, signs it, and re-uploads.
        run: ./installer/build_installer.ps1 -SkipBuild

      - name: Upload installer
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: WinStellarSetup
          path: build/installer/WinStellarSetup-*.exe
          if-no-files-found: error
          retention-days: 90

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download installer artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: WinStellarSetup
          path: ./dist

      - name: Publish release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          files: ./dist/WinStellarSetup-*.exe
          generate_release_notes: true   # auto changelog from PR titles since last tag
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}  # vX.Y.Z-beta1 → prerelease
          fail_on_unmatched_files: true
